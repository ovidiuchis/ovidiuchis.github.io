<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 – Page Not Found | Ovidiu Chiș</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" type="image/png" href="assets/favicon.png" />
    <meta name="description" content="Page not found. This link leads to a dead end, but home is just a click away." />
  </head>
  <body>
    <div class="aurora" aria-hidden="true"></div>
    <main class="linktree-container" style="max-width: 580px">
      <div class="glass-card" style="max-width: 420px">
        <!-- 404 Icon -->
        <div style="margin-bottom: 1.5rem">
          <svg
            width="96"
            height="96"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.2"
            stroke-linecap="round"
            stroke-linejoin="round"
            style="color: var(--accent); opacity: 0.45"
          >
            <circle cx="12" cy="12" r="10" />
            <path d="M16 16s-1.5-2-4-2-4 2-4 2" />
            <line x1="9" y1="9" x2="9.01" y2="9" />
            <line x1="15" y1="9" x2="15.01" y2="9" />
          </svg>
        </div>

        <h1
          style="
            font-size: 3.5rem;
            margin: 0 0 0.5rem;
            font-weight: 700;
            color: var(--text);
            animation: fadeUp 0.55s var(--ease) both 0.1s;
            letter-spacing: -1px;
          "
        >
          404
        </h1>

        <p
          style="
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: var(--accent);
            margin: 0 0 1.5rem;
            animation: fadeUp 0.55s var(--ease) both 0.16s;
          "
        >
          Page Not Found
        </p>

        <p
          style="
            font-size: 0.96rem;
            line-height: 1.65;
            margin: 0 0 2rem;
            color: var(--text-muted);
            text-align: center;
            animation: fadeUp 0.55s var(--ease) both 0.22s;
            font-style: italic;
          "
        >
          You've uncovered a secret—just not the good kind.<br />
          This link's a dead end.
        </p>

        <div style="width: 100%; animation: fadeUp 0.55s var(--ease) both 0.28s">
          <a href="/" class="btn-pill" style="width: 100%">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
              <path d="M12 3l8.5 6.5v11a.5.5 0 0 1-.5.5h-5v-6h-6v6H4a.5.5 0 0 1-.5-.5v-11L12 3z" />
            </svg>
            Take Me Home
          </a>
        </div>
      </div>
    </main>

    <!-- Cloudflare Web Analytics -->
    <script
      defer
      src="https://static.cloudflareinsights.com/beacon.min.js"
      data-cf-beacon='{"token": "830a42b27f784c1497ecc74a3a5435c1"}'
    ></script>
    <!-- End Cloudflare Web Analytics -->
  </body>
</html>
